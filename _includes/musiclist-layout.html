
	{% for item in site.data.music %}
    
	


<details> 
	<summary>{{item.name}}  &nbsp; <p2>{{item.instrumentation}}</p2></summary>
	{{item.date}}
	</br>
    {{item.description}}
    </br>
    </br>
	<center><p3>
    {% for item in item.poem %}
	
	{{item}}
    
	</br>
	{% endfor %}
	</p3></center>
    
    {% if item.link != none %}
    <details>
    	<summary><p4>score</p4></summary>
    	<iframe src="{{item.link}}" style="width:100%; height:500px" frameborder="0"></iframe> 
	</details>

	{% endif %}
    </br>
    {{item.audio}}
    
    </br>
    
    {{item.video}}
    

    </details>

    </br>
    </br>
  {% endfor %}
