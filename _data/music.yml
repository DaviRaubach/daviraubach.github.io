- name: Autumn Floor
  date: 2017-8
  instrumentation: for flute and electronics
  description: 'Premiered by Valentina Daldegan. "Chão de outono" is the result of a collaboration between the composer and the flutist Valentina Daldegan. It is based on the homonymous poem of Mario Quintana (Chão de outono). This is a possible translation for it:'

  poem:
    - Autumn Floor
    - Throughout the uneven stones of the paving, poor yellow leaves in a panic pass by, pursued by an invitation of burial, sinister, crackling, each time nearer and nearer, two wings dressed in black!

  descriptionII: Throughout the piece, the flutist recites the poem and plays the flute concurrently.
  link: https://drive.google.com/file/d/1z8v9U1pQHrwlD2crRYyDXW2KD4HkwvMG/preview
